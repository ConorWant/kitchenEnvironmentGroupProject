{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KitchenSense Sign In</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'css/icon/kitchensense_icon.svg' %}">
    <link rel="shortcut icon" href="{% static 'css/icon/kitchensense_icon.svg' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="login-screen">
    <div class="ambient"></div>
    <section class="login-card">
        <img src="{% static 'css/icon/kitchensense_logo.svg' %}" alt="KitchenSense logo" class="login-logo">
        <p class="eyebrow">Secure Access</p>
        <h1>KitchenSense Dashboard</h1>
        {% if form.errors %}
        <p class="error-message">Invalid username or password.</p>
        {% endif %}
        <form method="post" class="login-form">
            {% csrf_token %}
            <label for="id_username">Username</label>
            <input id="id_username" name="username" type="text" required>

            <label for="id_password">Password</label>
            <input id="id_password" name="password" type="password" required>

            <button type="submit">Sign In</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </section>
</body>
</html>
