{% extends 'base.html' %}

{% block content %}

        Please check your email{% if email %} ({{ email }}){% endif %} to verify your account.

        Once verified, you can sign in using the link below.

    <a href="{% url 'login' %}">Go to login</a>
</section>
{% endblock %}
