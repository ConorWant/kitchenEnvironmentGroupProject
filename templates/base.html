{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title|default:"Kitchen Environment" }}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
    <div class="ambient"></div>
    <header class="site-header">
        <div class="brand-wrap">
            <p class="eyebrow">Kitchen Environment</p>
            <h1 class="brand">Cold Chain Monitor</h1>
        </div>
        <nav class="site-nav">
            <a href="{% url 'monitor:dashboard' %}">Dashboard</a>
            <a href="{% url 'monitor:history' %}">History</a>
            {% if request.user.is_superuser %}
            <a href="{% url 'monitor:live_dashboard' %}">Management</a>
            {% endif %}
            <a href="{% url 'admin:index' %}">Admin</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="nav-logout">Log out</button>
            </form>
        </nav>
    </header>

    <main class="shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
