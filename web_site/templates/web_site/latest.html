<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Fridge Sensor Readings</title>
    <style>
        table {border-collapse: collapse; width: 100%;}
        th, td {padding: 8px 12px; border: 1px solid #ccc;}
        th {background:#f4f4f4;}
    </style>
</head>
<body>
<h1>Latest Fridge Readings</h1>
<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Temp (°C)</th>
            <th>Humidity (%)</th>
            <th>Pressure (hPa)</th>
            <th>Door</th>
            <th>Light</th>
        </tr>
    </thead>
    <tbody>
    {% for r in readings %}
        <tr>
            <td>{{ r.timestamp }}</td>
            <td>{{ r.temperature_c }}</td>
            <td>{{ r.humidity_pct }}</td>
            <td>{{ r.pressure_hpa }}</td>
            <td>{{ r.door_status }}</td>
            <td>{{ r.light_level }}</td>
        </tr>
    {% empty %}
        <tr><td colspan="6">No readings yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
</body>
</html>
